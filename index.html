<!doctype html>
<html>
    <head>
        <style>
            .content > .item > .item-header {
                display: block;
                font-size: larger;
                font-weight: bold;
                margin-bottom: 5px;
            }

            div.item {
                margin-top: 20px;
                margin-bottom: 20px;
                margin-left: 10px;
            }

            img {
                width: 150px;
            }
        </style>
        <meta charset="UTF-8">
        <title>KWEB Survey Page</title>
    </head>
    <body>
        <div class="header">
            <h1 class="heading">KWEB Survey Page</h1>
            <img src="https://i.imgur.com/hSSFVSw.png"><br>
            <a href="https://kwebofficial.com/">KWEB Homepage</a>
        </div><hr>
        <div class="content">
            <div class="item">
                <span class="item-header">
                    1. Write your name.
                </span>
                <input type="text" name="name">
            </div>
            <div class="item">
                <span class="item-header">
                    2. Write your student number.
                </span>
                <input type="text" name="student-number">
            </div>
            <div class="item">
                <span class="item-header">
                    3. Select your member level.
                </span>
                <label><input type="radio" name="level" value="admin">Admin</label>
                <label><input type="radio" name="level" value="intern">Intern</label>
                <label><input type="radio" name="level" value="qualified">Qualified</label>
            </div>
            <div class="item">
                <span class="item-header">
                    4. Select all fields you are interested in.
                </span>
                <label><input type="checkbox" name="interests" value="front">Front-end</label>
                <label><input type="checkbox" name="interests" value="back">Back-end</label>
                <label><input type="checkbox" name="interests" value="crawling">Web crawling</label>
                <label><input type="checkbox" name="interests" value="security">Web security</label>
                <label><input type="checkbox" name="interests" value="etc">Etcetera&nbsp;<input type="text" name="etc-content"></label>
            </div>
            <div class="item">
                <span class="item-header">
                    5. Give us your overall evaluation and feedback about the previous study.
                </span>
                <textarea cols="100" rows="5"
                          placeholder="if you have nothing to say, just say thanks to me"
                          name="feedback"></textarea>
            </div>
        </div>
        
    </body>
</html>
