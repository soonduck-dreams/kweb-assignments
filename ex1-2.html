<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Exercise 1-2 😉</title>
    </head>
    <body>
        <div class="item" id="item-username">
            <h3>Input username: </h3>
            <input type="text" name="username">    
        </div>
        <div class="item" id="item-password">
            <h3>Input password: </h3>
            <input type="password" name="password">
        </div>
        <div class="item" id="item-gender">
            <h3>Gender: </h3>
            <label><input type="radio" name="gender" value="male">Male</label>
            <label><input type="radio" name="gender" value="female">Female</label>
            <label><input type="radio" name="gender" value="other">Other</label>
        </div>
        <div class="item" id="item-major">
            <h3>Your Major: </h3>
            <select name="major">
            <option value="cs">Computer Science</option>
            <option value="phy">Physics</option>
            <option value="chm">Chemistry</option>
            <option value="math">Mathematics</option>
            </select>
        </div>
        <div class="item" id="item-introduction">
            <h3>Introduce yourself: </h3>
            <textarea cols="40" rows="5"
            placeholder="Introduce yourself"
            name="introduction"></textarea>
        </div>
    </body>
</html>
